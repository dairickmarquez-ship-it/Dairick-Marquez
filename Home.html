<!doctype html>
<html lang="en">
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>

    <style>
      * {
        padding: 0;
        margin: 0;
      }
      .main-box {
        width: 100vw;
        height: 30vh;
        background-size: cover;
        position: relative;
      }

      .overlay {
        background-color: rgba(0, 68, 255, 0.695);
        height: 30%;
        width: 100%;
        position: relative;
        z-index: 1;
      }
    </style>
  </head>
  <body>
      <div class="main-box">
      <div class="overlay">
        <h1 style="color: white">Logo</h1>
      </div>
    </div>

    <div style="height: 500vh"></div>
  </body>
  
</html>
